<style>
  :root{
    --nav:#07375f;
    --accent:#ff8800;
    --muted:#8b8b8b;
    --border:#e6e6e6;
    --bg:#ffffff;
    --field-bg:#fafafa;
  }

  html,body{height:100%;margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;}
  .mobile-wrapper{
    max-width:420px;margin:0 auto;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;
  }

  /* Header */
  .header{background:#002953;color:#fff;height:56px;display:flex;align-items:center;padding:0 12px;position:sticky;top:0;z-index:10}
  .header .back-btn,.header .close-btn{background:transparent;border:none;color:#fff;padding:8px;display:flex;align-items:center;justify-content:center}
  .header-title{flex:1;text-align:center;font-weight:700}

  /* Stepper */
  .stepper{display:flex;align-items:center;padding:12px 16px;background:#f7f9fb;border-bottom:1px solid var(--border)}
  .step{display:flex;align-items:center}
  .step + .step{margin-left:8px}
  .step-circle{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;background:#fff}
  .completed-circle{background:#fff;border-color:var(--accent)}
  .active-circle{background:#fff;border-color:var(--nav)}
  .step-label{font-size:12px;color:var(--muted);margin-left:8px}
  .active-label{color:var(--nav);font-weight:600}
  .step-line{height:2px;background:var(--border);flex:1;margin:0 8px}

  /* Content */
  .form-content{padding:16px;flex:1;overflow:auto}
  .section-header{margin-bottom:12px}
  .section-title{margin:0;font-size:18px;font-weight:700}
  .section-subtitle{margin:6px 0 0;color:var(--muted);font-size:13px}

  .field-group{margin-top:18px}
  .field-label{display:block;font-weight:600;margin-bottom:8px;color:#222}
  .required{color:#ff5722;margin-left:6px}
  .info-icon{color:#ff8800;margin-left:8px;font-size:14px}

  .text-input, .select-input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:6px;background:var(--field-bg);font-size:14px;color:#222}
  .text-input::placeholder{color:#9b9b9b}
  .select-wrapper{position:relative}
  .select-arrow{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#777}

  .radio-group{display:flex;gap:18px;margin-top:8px}
  .radio-option{display:flex;align-items:center;gap:8px;font-size:14px;color:#333}
  .radio-option input{width:16px;height:16px}

  .year-input{width:100px}

  .emi-header{margin-top:22px}
  .input-prefix-wrapper{display:flex;align-items:center;gap:8px}
  .currency-prefix{padding:12px 10px;border:1px solid var(--border);border-radius:6px;background:var(--field-bg);color:#333}
  .prefix-input{flex:1}

  .divider{height:1px;background:var(--border);margin:20px 0}

  /* Bottom actions */
  .action-bar{display:flex;gap:12px;padding:12px;background:#fff;border-top:1px solid var(--border);align-items:center}
  .btn-outline{flex:1;padding:12px;border-radius:24px;border:2px solid var(--accent);background:#fff;color:var(--accent);font-weight:700}
  .btn-primary{flex:1;padding:12px;border-radius:24px;border:0;background:linear-gradient(90deg,var(--accent),#ff6a00);color:#fff;font-weight:700}

  /* small screens */
  @media (max-width:420px){.mobile-wrapper{padding-bottom:8px}.stepper{gap:4px}}
</style>

<!-- Static UI for Business Details screen (visual only) -->
<div class="mobile-wrapper">

  <div class="header">
    <button class="back-btn" aria-label="back">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <div class="header-title">Home Loan Balance Transfer</div>
    <button class="close-btn" aria-label="close">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
  </div>

  <div class="stepper" aria-hidden>
    <div class="step">
      <div class="step-circle completed-circle">✓</div>
      <div class="step-label">Personal details</div>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-circle active-circle"></div>
      <div class="step-label active-label">Business details</div>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-circle">🔒</div>
      <div class="step-label">Income verification</div>
    </div>
  </div>

  <div class="form-content">

    <div class="section-header">
      <h3 class="section-title">Business details</h3>
      <div class="section-subtitle">Enter your business details and check your loan eligibility.</div>
    </div>

    <div class="field-group">
      <label class="field-label">Business Name <span class="required">*</span> <span class="info-icon">i</span></label>
      <input class="text-input" type="text" placeholder="Enter firm name as per business proof" />
    </div>

    <div class="field-group">
      <label class="field-label">Select Nature of Business <span class="required">*</span></label>
      <div class="radio-group">
        <label class="radio-option"><input type="radio" name="nature"/> Manufacturing</label>
        <label class="radio-option"><input type="radio" name="nature"/> Trading</label>
        <label class="radio-option"><input type="radio" name="nature"/> Services</label>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Business Type <span class="required">*</span> <span class="info-icon">i</span></label>
      <div class="select-wrapper">
        <select class="select-input">
          <option selected disabled>Select type of business</option>
          <option>Proprietorship</option>
          <option>Partnership</option>
          <option>Private Limited</option>
          <option>LLP</option>
        </select>
        <span class="select-arrow">▾</span>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Year of Business Registration <span class="required">*</span> <span class="info-icon">i</span></label>
      <input class="text-input year-input" type="text" placeholder="YYYY" maxlength="4" />
    </div>

    <div class="field-group">
      <label class="field-label">Annual Turnover <span class="required">*</span> <span class="info-icon">i</span></label>
      <div class="select-wrapper">
        <select class="select-input">
          <option selected disabled>Select yearly revenue range</option>
          <option>Less than ₹10 Lakhs</option>
          <option>₹10 - ₹50 Lakhs</option>
          <option>₹50 Lakhs - ₹1 Crore</option>
          <option>More than ₹1 Crore</option>
        </select>
        <span class="select-arrow">▾</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-header emi-header">
      <h3 class="section-title">Active EMI details</h3>
    </div>

    <div class="field-group">
      <label class="field-label">Total Active Monthly Loan EMIs <span class="required">*</span> <span class="info-icon">i</span></label>
      <div class="input-prefix-wrapper">
        <div class="currency-prefix">₹</div>
        <input class="text-input prefix-input" type="text" placeholder="Enter the sum of all the EMIs paid by you" />
      </div>
    </div>

    <div class="bottom-spacer" style="height:30px"></div>
  </div>

  <div class="action-bar">
    <button class="btn-outline">SAVE TO CART</button>
    <button class="btn-primary">CONTINUE</button>
  </div>

</div>

<router-outlet></router-outlet>
